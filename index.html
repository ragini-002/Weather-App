<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waether App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">

        <div class="div1">
            <input type="text" 
                placeholder="enter city name" 
                class="input1">

            <button class="button1">Search</button>
        </div>

        <div class="weather">

            <div class="div2">
                <img 
                    src="https://www.accuweather.com/images/weathericons/v2a/35.svg" 
                    alt="weather report" 
                    class="icon" 
                    style="width:125px">

                <h1 class="temp">22<span>℃</span></h1>
                <h2 class="city">New York</h2>
            </div>

            <div class="div3">

                <div class="image1">
                    <img src="weather.png" style="width:60px;">

                <div>
                    <p class="humidity" style="font-size:24px;">50%</p>
                    <p style="font-size:18px;">humidity</p>
                </div>
            </div>

            <div class="image2">
                <img src="wind.png" style="width:50px;">

                <div>
                    <p class="wind" style="font-size:22px">15 km/hr</p>
                    <p style="font-size:18px;">wind speed</p>
                </div>

            </div>

        </div>

    </div>
    
</div>

    <script src="script.js"></script>

</body>
</html>
